name: Build & Push (store frontend)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push (store frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push (store frontend)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          echo "Building store frontend..."

          TEMPLATE_VERSION=$(node -p "require('./package.json').version")
          IMAGE_TAG="${TEMPLATE_VERSION}-${GITHUB_SHA::7}"

          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_STORE_ID="${{ vars.NEXT_PUBLIC_STORE_ID }}" \
            --build-arg NEXT_PUBLIC_STORE_NAME="${{ vars.NEXT_PUBLIC_STORE_NAME }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:latest"

# NOTE: Per-fork setup (see RUNBOOK.md) — Settings > Secrets and variables > Actions:
#   Secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   Variables: ECR_REPOSITORY, NEXT_PUBLIC_API_URL, NEXT_PUBLIC_STORE_ID, NEXT_PUBLIC_STORE_NAME
# No code differs between store forks for deployment — only these repo Variables/Secrets.

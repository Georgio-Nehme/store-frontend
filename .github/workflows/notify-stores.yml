name: Notify store forks of new release

# Fires when a template release is tagged (see CHANGELOG.md / RUNBOOK.md for the
# release process). Opens a "sync" PR on every store fork listed in stores.json,
# merging the new tag in. Forks that only customized store.config/ get a clean,
# rubber-stampable merge; a fork that hand-edited shared files sees a conflict PR
# scoped to itself only — it never blocks or touches the other stores.

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  load-stores:
    runs-on: ubuntu-latest
    outputs:
      stores: ${{ steps.read.outputs.stores }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "stores=$(jq -c . stores.json)" >> "$GITHUB_OUTPUT"

  sync:
    needs: load-stores
    if: ${{ needs.load-stores.outputs.stores != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        store: ${{ fromJson(needs.load-stores.outputs.stores) }}
    steps:
      - name: Checkout store fork
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.store }}
          token: ${{ secrets.STORES_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Merge template release into a sync branch
        id: merge
        env:
          GH_TOKEN: ${{ secrets.STORES_SYNC_TOKEN }}
          TEMPLATE_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "template-sync-bot"
          git config user.email "template-sync-bot@users.noreply.github.com"

          git remote add template "https://x-access-token:${GH_TOKEN}@github.com/${TEMPLATE_REPO}.git"
          git fetch template "refs/tags/${TAG}:refs/tags/${TAG}"

          BRANCH="sync/${TAG}"
          git checkout -b "$BRANCH"

          if git merge "refs/tags/${TAG}" --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "Merge template ${TAG} (has conflicts — needs manual resolution)"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

          git push origin "$BRANCH" --force-with-lease

      - name: Open sync PR
        env:
          GH_TOKEN: ${{ secrets.STORES_SYNC_TOKEN }}
          TAG: ${{ github.ref_name }}
          CONFLICT: ${{ steps.merge.outputs.conflict }}
        run: |
          if [ "$CONFLICT" = "true" ]; then
            BODY="Automated sync from template release \`${TAG}\`.\n\n⚠️ This merge has unresolved conflicts — resolve them on this branch before merging."
          else
            BODY="Automated sync from template release \`${TAG}\`.\n\nClean merge — should be safe to review and merge."
          fi

          gh pr create \
            --repo "${{ matrix.store }}" \
            --title "Sync template ${TAG}" \
            --body "$(printf '%b' "$BODY")" \
            --head "sync/${TAG}" \
            --base main \
            || echo "PR may already exist for this tag on ${{ matrix.store }}; skipping."
